# GLM-OCR SDK 配置 — 方法二（selfhosted + 版面检测）
#
# 本配置文件用于 ocr_method2_sdk.py，指向本地 vLLM GLM-OCR 服务，
# 启用 PP-DocLayout-V3 版面检测完整流水线。
#
# 参考：官方 glmocr/config.yaml 完整配置

# Logging
logging:
  level: INFO

# Pipeline
pipeline:
  # ── MaaS 模式：禁用（使用本地 vLLM） ──────────────────────────────────────
  maas:
    enabled: false

  # ── 本地 vLLM OCR 服务 ─────────────────────────────────────────────────────
  ocr_api:
    api_host: localhost
    api_port: 8080
    model: glm-ocr                    # 与 vLLM --served-model-name 一致
    api_mode: openai                  # OpenAI 兼容接口
    api_path: /v1/chat/completions
    verify_ssl: false
    connect_timeout: 30
    request_timeout: 120
    retry_max_attempts: 5
    retry_backoff_base_seconds: 0.5
    retry_backoff_max_seconds: 8.0
    retry_jitter_ratio: 0.2
    retry_status_codes: [429, 500, 502, 503, 504]
    connection_pool_size: 128

  # ── 并发控制（单卡 48G 显存，降低并发避免 vLLM 过载）────────────────────
  max_workers: 4
  page_maxsize: 100
  region_maxsize: 50

  # ── 页面加载 ───────────────────────────────────────────────────────────────
  page_loader:
    max_tokens: 4096
    temperature: 0.8
    top_p: 0.9
    top_k: 50
    repetition_penalty: 1.1

    # 图片处理
    t_patch_size: 2
    patch_expand_factor: 1
    image_expect_length: 6144
    image_format: JPEG
    min_pixels: 12544                 # 112 × 112
    max_pixels: 71372800              # 14 × 14 × 4 × 1280

    # 默认 prompt（无版面检测时使用）
    default_prompt: >
      Recognize the text in the image and output in Markdown format.
      Preserve the original layout (headings/paragraphs/tables/formulas).
      Do not fabricate content that does not exist in the image.

    # 版面检测后按区域类型使用的 prompt
    task_prompt_mapping:
      text: "Text Recognition:"
      table: "Table Recognition:"
      formula: "Formula Recognition:"

    # PDF 渲染
    pdf_dpi: 200
    pdf_max_pages: null                # null = 不限页数
    pdf_verbose: false

  # ── 结果格式化 ─────────────────────────────────────────────────────────────
  result_formatter:
    filter_nested: true
    min_overlap_ratio: 0.8
    output_format: both               # json + markdown

    label_visualization_mapping:
      table:
        - table
      formula:
        - display_formula
        - inline_formula
      image:
        - chart
        - image
      text:
        - abstract
        - algorithm
        - content
        - doc_title
        - figure_title
        - paragraph_title
        - reference_content
        - text
        - vertical_text
        - vision_footnote
        - seal
        - formula_number

  # ── 版面检测：启用 PP-DocLayout-V3 ─────────────────────────────────────────
  enable_layout: true

  layout:
    # 本地模型路径（已下载到此目录）
    model_dir: /workspace/data/llm_models/models/PaddlePaddle/PP-DocLayoutV3

    threshold: 0.3
    batch_size: 1
    workers: 1
    cuda_visible_devices: "0"
    # device: null                   # null = 自动选择（有 GPU 用 GPU，否则 CPU）

    # 后处理
    layout_nms: true
    layout_unclip_ratio:
      - 1.0
      - 1.0

    # 重叠 bbox 合并策略
    layout_merge_bboxes_mode:
      0: large    # abstract
      1: large    # algorithm
      2: large    # aside_text
      3: large    # chart
      4: large    # content
      5: large    # display_formula
      6: large    # doc_title
      7: large    # figure_title
      8: large    # footer
      9: large    # footer_image
      10: large   # footnote
      11: large   # formula_number
      12: large   # header
      13: large   # header_image
      14: large   # image
      15: large   # inline_formula
      16: large   # number
      17: large   # paragraph_title
      18: small   # reference
      19: large   # reference_content
      20: large   # seal
      21: large   # table
      22: large   # text
      23: large   # vertical_text
      24: large   # vision_footnote

    # 检测标签 → OCR 任务类型映射
    label_task_mapping:
      text:
        - abstract
        - algorithm
        - content
        - doc_title
        - figure_title
        - paragraph_title
        - reference_content
        - text
        - vertical_text
        - vision_footnote
        - seal
        - formula_number
      table:
        - table
      formula:
        - display_formula
        - inline_formula
      skip:                           # 保留区域但不 OCR（图片类）
        - chart
        - image
      abandon:                        # 丢弃区域（页眉页脚等）
        - header
        - footer
        - number
        - footnote
        - aside_text
        - reference
        - footer_image
        - header_image

    # 标签 ID → 标签名映射
    id2label:
      0: abstract
      1: algorithm
      2: aside_text
      3: chart
      4: content
      5: display_formula
      6: doc_title
      7: figure_title
      8: footer
      9: footer_image
      10: footnote
      11: formula_number
      12: header
      13: header_image
      14: image
      15: inline_formula
      16: number
      17: paragraph_title
      18: reference
      19: reference_content
      20: seal
      21: table
      22: text
      23: vertical_text
      24: vision_footnote
